<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>مرحباً بك من جديد</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff;
            padding: 16px;
        }
        .main-card {
            width: 100%;
            max-width: 450px;
            min-height: 500px;
            text-align: center;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .logo-text { font-size: 24px; font-weight: 500; margin-bottom: 20px; }
        .g { color: #4285F4; }
        .o1 { color: #EA4335; }
        .o2 { color: #FBBC05; }
        .l { color: #34A853; }

        h1 { font-size: 24px; color: #202124; margin-bottom: 10px; font-weight: 500; }
        .user-email {
            color: #3c4043; font-size: 15px; margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .desc-text { color: #3c4043; font-size: 15px; margin-bottom: 40px; line-height: 1.5; }

        .footer-actions {
            display: flex; justify-content: space-between;
            align-items: center; width: 100%; margin-top: auto;
        }
        .btn-blue {
            background: #1a73e8; color: #fff; padding: 12px 28px;
            border-radius: 4px; text-decoration: none; font-weight: 500;
            font-size: 15px; cursor: pointer; border: none;
            transition: background-color 0.2s; min-height: 44px;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-blue:hover { background: #1557b0; }
        .btn-blue:active { background: #0d47a1; }
        .link-text {
            color: #1a73e8; font-weight: 600; font-size: 15px;
            cursor: pointer; text-decoration: none; padding: 8px 0;
        }
        .link-text:hover { color: #1557b0; }

        @media (max-width: 480px) {
            body { padding: 0; align-items: flex-start; }
            .main-card {
                padding: 32px 24px 24px; border: none; box-shadow: none;
                width: 100%; min-height: 100vh; border-radius: 0;
            }
            h1 { font-size: 22px; }
            .desc-text { font-size: 14px; }
            .footer-actions { flex-direction: column-reverse; gap: 16px; }
            .btn-blue { width: 100%; }
            .link-text { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="logo-text">
        <span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="g">g</span><span class="l">l</span><span class="o1">e</span>
    </div>

    <h1>مرحباً بك من جديد</h1>

    <div class="user-email">
        <span id="welcome-email">example@gmail.com</span>
        <span>👤</span>
    </div>

    <p class="desc-text">يمكنك تعديل كلمة مرور حسابك الآن إذا نسيتها.</p>

    <div class="footer-actions">
        <a href="https://myaccount.google.com" class="link-text">تعديل كلمة المرور</a>
        <button class="btn-blue" onclick="window.location.href='https://www.google.com';">متابعة</button>
    </div>
</div>

<script>
    const email = localStorage.getItem('user_email');
    if (email) {
        document.getElementById('welcome-email').textContent = email;
    }
</script>

</body>
</html>
